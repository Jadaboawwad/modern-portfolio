# Overrides Netlify UI publish dir (was `build` from CRA template).
# Next.js output lives in `.next`; @netlify/plugin-nextjs handles deployment.
[build]
  command = "yarn run build"
  publish = ".next"
  ignore = "git diff HEAD^ HEAD --name-only | grep -qEv '(\\.md$|LICENSE$|\\.env\\.example$|^\\.github/|^\\.vscode/)' && exit 1 || exit 0"

[build.environment]
  # Same-origin proxies — do not point these at ngrok directly.
  NEXT_PUBLIC_CHATBOT_URL = "https://jehadabuawwad.com/chat"
  NEXT_PUBLIC_RAG_API_URL = "/rag-api"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[edge_functions]]
  path = "/chat"
  function = "chat-proxy"

[[edge_functions]]
  path = "/chat/*"
  function = "chat-proxy"

[[edge_functions]]
  path = "/_stcore/*"
  function = "chat-proxy"

[[edge_functions]]
  path = "/rag-api"
  function = "api-proxy"

[[edge_functions]]
  path = "/rag-api/*"
  function = "api-proxy"
