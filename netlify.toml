# Overrides Netlify UI publish dir (was `build` from CRA template).
# Next.js output lives in `.next`; @netlify/plugin-nextjs handles deployment.
[build]
  command = "yarn run build"
  publish = ".next"
  ignore = "git diff HEAD^ HEAD --name-only | grep -qEv '(\\.md$|LICENSE$|\\.env\\.example$|^\\.github/|^\\.vscode/)' && exit 1 || exit 0"

[build.environment]
  NEXT_PUBLIC_CHATBOT_URL = "https://jehadabuawwad.com/chat"
  # Chat POST bypasses Netlify edge (~26s timeout). Browser → ngrok → gateway :9080.
  # Update when your ngrok URL changes (same as netlify/edge-functions/chat-proxy.js).
  NEXT_PUBLIC_RAG_API_URL = "https://curable-steerable-obnoxious.ngrok-free.dev"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[edge_functions]]
  path = "/chat"
  function = "chat-proxy"

[[edge_functions]]
  path = "/chat/*"
  function = "chat-proxy"

[[edge_functions]]
  path = "/_stcore/*"
  function = "chat-proxy"

[[edge_functions]]
  path = "/rag-api"
  function = "api-proxy"

[[edge_functions]]
  path = "/rag-api/*"
  function = "api-proxy"
